<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lexique A1 — Mind‑Map</title>
<style>
  :root{--bg:#0f1724;--card:#0b1220;--accent:#06b6d4;--muted:#94a3b8;--text:#e6eef6}
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#071025 0%,#071726 100%);font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;color:var(--text)}
  .app{display:flex;gap:18px;padding:18px;box-sizing:border-box;height:100%}
  .sidebar{width:320px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-radius:12px;padding:14px;box-sizing:border-box;overflow:auto}
  h1{font-size:18px;margin:6px 0 12px;color:var(--accent)}
  .node-list{display:flex;flex-direction:column;gap:8px}
  .node{background:rgba(255,255,255,0.02);padding:10px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
  .node b{font-size:15px}
  .map{flex:1;position:relative;border-radius:12px;padding:18px;box-sizing:border-box;overflow:auto}
  .mind{position:relative;width:2000px;height:1600px;background:radial-gradient(circle at 10% 10%, rgba(6,182,212,0.04), transparent 10%), transparent;border-radius:10px}
  .center{position:absolute;left:50%;top:10%;transform:translateX(-50%);text-align:center}
  .center .hub{display:inline-block;background:var(--accent);color:#052025;padding:12px 18px;border-radius:999px;font-weight:700}
  .cluster{position:absolute;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:10px;border-radius:10px;min-width:220px;max-width:320px}
  .cluster h3{margin:0 0 8px;font-size:14px;color:var(--accent)}
  .word{display:inline-block;background:rgba(255,255,255,0.02);margin:4px;padding:6px 8px;border-radius:6px;cursor:pointer;position:relative}
  .word:hover{box-shadow:0 6px 18px rgba(2,6,23,0.6)}
  .tooltip{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 8px);background:#021827;color:var(--text);padding:8px;border-radius:6px;font-size:13px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s}
  .word:hover .tooltip{opacity:1}
  .controls{display:flex;gap:8px;margin-top:10px}
  .btn{background:var(--accent);color:#042022;padding:8px 10px;border-radius:8px;border:none;cursor:pointer}
  .page{position:fixed;inset:40px;border-radius:10px;background:linear-gradient(180deg,#061322,#04121a);padding:18px;box-sizing:border-box;display:none;flex-direction:column;z-index:60;overflow:auto}
  .page.active{display:flex}
  .page header{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .page h2{margin:0;color:var(--accent)}
  .close{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--text);padding:6px 10px;border-radius:8px;cursor:pointer}
  .section{margin-top:12px;background:rgba(255,255,255,0.01);padding:12px;border-radius:10px}
  .text, .dialog{line-height:1.5}
  .phrase {display:inline-block;position:relative;padding:4px;border-radius:6px;margin:3px;cursor:default}
  .phrase:hover{background:rgba(255,255,255,0.02)}
  .phrase .translate{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 8px);background:#031e2a;padding:6px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .12s;white-space:nowrap}
  .phrase:hover .translate{opacity:1}
  .play{background:#0b2b2f;color:var(--accent);padding:6px 8px;border-radius:8px;border:none;cursor:pointer;margin-left:8px}
  footer{margin-top:18px;color:var(--muted);font-size:13px}
  /* positions for clusters (adjust as needed) */
  .c1{left:60px;top:160px}
  .c2{left:420px;top:20px}
  .c3{left:780px;top:140px}
  .c4{left:1160px;top:40px}
  .c5{left:60px;top:420px}
  .c6{left:420px;top:360px}
  .c7{left:780px;top:360px}
  .c8{left:1160px;top:360px}
  .c9{left:420px;top:700px}
  .c10{left:780px;top:700px}
  /* responsive */
  @media (max-width:1100px){
    .app{flex-direction:column}
    .sidebar{width:auto;order:2}
    .map{order:1;height:650px}
    .mind{width:1400px;height:1000px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <h1>Lexique A1 — Mind‑Map</h1>
    <div class="node-list" id="nodes"></div>
    <div class="controls">
      <button class="btn" id="playAll">Произнести слово</button>
      <button class="btn" id="stopAll">Стоп</button>
    </div>
    <footer>Наведите на слово — перевод; клик — произношение (мужской голос).</footer>
  </aside>

  <main class="map">
    <div class="mind" id="mind">
      <div class="center"><div class="hub">Lexique A1</div></div>
      <!-- clusters (populated by JS) -->
    </div>
  </main>
</div>

<!-- Pages for each category -->
<div class="page" id="page">
  <header>
    <h2 id="pageTitle"></h2>
    <div>
      <button class="close" id="closePage">Закрыть</button>
    </div>
  </header>
  <div class="section">
    <h3 style="margin:0 0 8px;color:var(--accent)">Текст (использует слова категории)</h3>
    <div class="text" id="pageText"></div>
  </div>
  <div class="section">
    <h3 style="margin:0 0 8px;color:var(--accent)">Диалог</h3>
    <div class="dialog" id="pageDialog"></div>
  </div>
  <footer>Наведение на фразу — перевод на русский; кнопка воспроизводит фразу.</footer>
</div>

// Helper: flatten for sidebar
const categories = data.map(d=>d.cat);

// create clusters visually and sidebar nodes
const mind = document.getElementById('mind');
const nodesDiv = document.getElementById('nodes');

data.forEach((group,i)=>{
  // sidebar node
  const node = document.createElement('div'); node.className='node';
  node.innerHTML = `<b>${group.cat}</b><span style="color:var(--muted);font-size:13px">${group.words.length}</span>`;
  node.onclick = ()=>openPage(i);
  nodesDiv.appendChild(node);

  // cluster box
  const c = document.createElement('div'); c.className='cluster c'+((i%18)+1);
  const h = document.createElement('h3'); h.textContent = group.cat;
  c.appendChild(h);
  const wrap = document.createElement('div');
  group.words.forEach(w=>{
    const wspan = document.createElement('span'); wspan.className='word';
    const fr = w[0]; const ru = w[1] || '';
    // tooltip for translation on hover of single word
    wspan.innerHTML = `<span>${fr}</span><div class="tooltip">${ru || ''}</div>`;
    // click -> pronounce single word/phrase
    wspan.onclick = (ev)=>{
      ev.stopPropagation();
      speak(fr);
    };
    wrap.appendChild(wspan);
  });
  c.appendChild(wrap);
  mind.appendChild(c);
});

// Position clusters in a distributed layout (deterministic)
const cls = document.querySelectorAll('.cluster');
cls.forEach((el,idx)=>{
  const cols = 4;
  const row = Math.floor(idx/cols);
  const col = idx%cols;
  const left = 60 + col*360;
  const top = 120 + row*260;
  el.style.left = left+'px';
  el.style.top = top+'px';
});

// Speech synthesis (male voice preference)
let synth = window.speechSynthesis;
function getMaleVoice(){
  const voices = synth.getVoices ? synth.getVoices() : [];
  // prefer voices with male or 'Google français' then fallback to first
  let v = voices.find(v=>/fr|Français|French/i.test(v.lang) && /male|Masculin|Homme/i.test(v.name));
  if(!v) v = voices.find(v=>/fr|fr-FR/i.test(v.lang));
  if(!v && voices.length) v = voices[0];
  return v || null;
}
let voice = null;
function ensureVoices(){
  voice = getMaleVoice();
}
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = ensureVoices;
}
ensureVoices();

function speak(text){
  if(!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR';
  if(voice) u.voice = voice;
  // set slightly faster natural rate for clarity
  u.rate = 0.95;
  synth.speak(u);
}

document.getElementById('playAll').onclick = ()=>{
  // pronounce first word of currently visible cluster or sequentially all words of first category
  // by rule: be decisive -> play all words of first category sequentially
  const items = data[0].words.map(w=>w[0]);
  let idx=0;
  function next(){
    if(idx>=items.length) return;
    speak(items[idx]);
    idx++;
    // wait ~700ms + length-based
    const wait = 700 + Math.min(1200, items[idx-1].length*80);
    setTimeout(next, wait);
  }
  next();
};
document.getElementById('stopAll').onclick = ()=>{ if(synth) synth.cancel(); };

// Page (category detail) generation
const page = document.getElementById('page');
const pageTitle = document.getElementById('pageTitle');
const pageText = document.getElementById('pageText');
const pageDialog = document.getElementById('pageDialog');
document.getElementById('closePage').onclick = ()=>{ page.classList.remove('active'); if(synth) synth.cancel(); };

function openPage(i){
  const g = data[i];
  pageTitle.textContent = g.cat;
  // Build a short text using words of category: create 4–6 sentences combining entries
  pageText.innerHTML = '';
  const sentences = buildTextSentences(g.words);
  sentences.forEach(s=>{
    const sp = document.createElement('span'); sp.className='phrase';
    sp.innerHTML = escapeHtml(s.fr) + `<div class="translate">${escapeHtml(s.ru)}</div>`;
    // click to speak
    sp.onclick = ()=>speak(s.fr);
    pageText.appendChild(sp);
  });
  // Build a 6-line dialog alternating A/B using words from group and nearby groups (to ensure rich usage)
  pageDialog.innerHTML = '';
  const dialog = buildDialog(g.words);
  dialog.forEach(line=>{
    const div = document.createElement('div'); div.style.margin='6px 0';
    const who = document.createElement('b'); who.style.color='var(--accent)'; who.textContent = line.speaker+': ';
    const content = document.createElement('span'); content.className='phrase';
    content.innerHTML = escapeHtml(line.fr) + `<div class="translate">${escapeHtml(line.ru)}</div>`;
    content.onclick = ()=>speak(line.fr);
    div.appendChild(who); div.appendChild(content);
    pageDialog.appendChild(div);
  });

  page.classList.add('active');
  window.scrollTo(0,0);
}

// Helpers: buildTextSentences and buildDialog
function buildTextSentences(words){
  // make up to 6 sentences by sampling words and forming simple sentences.
  const out=[];
  const pool = words.map(w=>({fr:w[0],ru:w[1]||''}));
  for(let i=0;i<6 && pool.length;i++){
    const a = pool[Math.floor(Math.random()*pool.length)];
    const b = pool[Math.floor(Math.random()*pool.length)];
    const s = combineToSentence(a,b);
    out.push(s);
  }
  return out;
}
function combineToSentence(a,b){
  // simple patterns
  const patterns = [
    `${a.fr} et ${b.fr}.`,
    `Je vois ${a.fr} et ${b.fr}.`,
    `C’est ${a.fr}. ${b.fr}.`,
    `${a.fr} — ${b.fr}.`,
    `Nous avons ${a.fr} et ${b.fr}.`
  ];
  const idx = Math.floor(Math.random()*patterns.length);
  const fr = patterns[idx];
  const ru = `${a.ru || ''}${a.ru && b.ru ? ' и ' : ''}${b.ru || ''}`.trim();
  return {fr,ru};
}
function buildDialog(words){
  const out=[];
  const pool = words.map(w=>({fr:w[0],ru:w[1]||''}));
  // create 6 lines alternating A/B
  for(let i=0;i<6;i++){
    const pick = pool[Math.floor(Math.random()*pool.length)];
    const speaker = i%2===0 ? 'A' : 'B';
    // short phrase or question
    let fr = pick.fr;
    if(!/[?.!]/.test(fr)) fr = fr.match(/Je |Tu |Nous |Il |Elle /i) ? fr : fr;
    out.push({speaker,fr,ru:pick.ru});
  }
  return out;
}

// escape for html
function escapeHtml(s){ if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// On load, open first category for quick access
openPage(0);
