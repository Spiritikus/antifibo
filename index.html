<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELF A1 — Lexique Interactif</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --card: #1e2230;
    --border: #2a3048;
    --accent1: #e8b86d;
    --accent2: #7eb8d4;
    --accent3: #c47fc4;
    --accent4: #6ecf9e;
    --accent5: #e07c7c;
    --accent6: #7cb8e0;
    --text: #e8e4d9;
    --muted: #8b8fa8;
    --line: rgba(232,184,109,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── STAR BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(126,184,212,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(196,127,196,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(232,184,109,0.03) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 18px 40px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    color: var(--accent1);
  }
  .logo span { color: var(--muted); font-weight: 400; font-size: 0.9rem; margin-left: 10px; }

  .nav-back {
    display: none;
    align-items: center; gap: 8px;
    cursor: pointer;
    color: var(--accent1);
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
  }
  .nav-back:hover { opacity: 0.7; }
  .nav-back svg { width: 16px; height: 16px; }

  /* ── PAGES ── */
  .page { position: relative; z-index: 1; display: none; }
  .page.active { display: block; }

  /* ── MINDMAP PAGE ── */
  #page-mindmap {
    padding-top: 80px;
    min-height: 100vh;
  }

  .mindmap-hero {
    text-align: center;
    padding: 60px 20px 40px;
  }
  .mindmap-hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    color: var(--accent1);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .mindmap-hero p {
    margin-top: 16px;
    color: var(--muted);
    font-size: 1.15rem;
    font-style: italic;
  }

  .mindmap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px 40px 80px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .category-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
  }
  .category-card::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 16px;
  }
  .category-card:hover { transform: translateY(-4px); border-color: var(--accent-color, var(--accent1)); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .category-card:hover::before { opacity: 1; }

  .cat-icon {
    font-size: 2rem;
    margin-bottom: 12px;
    display: block;
  }
  .cat-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent-color, var(--accent1));
    margin-bottom: 6px;
  }
  .cat-subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .cat-count {
    margin-top: 14px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .cat-count span {
    color: var(--accent-color, var(--accent1));
    font-weight: 600;
  }
  .cat-arrow {
    position: absolute; right: 20px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1.2rem;
    transition: all 0.3s;
  }
  .category-card:hover .cat-arrow {
    color: var(--accent-color, var(--accent1));
    transform: translateY(-50%) translateX(4px);
  }

  /* ── CATEGORY PAGE ── */
  #page-category {
    padding-top: 80px;
    min-height: 100vh;
  }

  .cat-page-header {
    padding: 50px 40px 30px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 20px;
  }
  .cat-page-icon { font-size: 3rem; }
  .cat-page-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--cat-color, var(--accent1));
  }
  .cat-page-header p { color: var(--muted); font-style: italic; margin-top: 4px; }

  .cat-page-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: calc(100vh - 300px);
  }

  /* Words panel */
  .words-panel {
    padding: 30px 40px;
    border-right: 1px solid var(--border);
  }
  .words-panel h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--muted);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .words-grid {
    display: flex; flex-wrap: wrap; gap: 10px;
  }

  .word-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 16px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    display: flex; align-items: center; gap: 8px;
  }
  .word-chip:hover {
    border-color: var(--cat-color, var(--accent1));
    background: rgba(232,184,109,0.08);
    transform: scale(1.05);
  }
  .word-chip .speak-btn {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: color 0.2s;
  }
  .word-chip:hover .speak-btn { color: var(--cat-color, var(--accent1)); }

  /* Tooltip */
  .word-chip .tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--cat-color, var(--accent1));
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.85rem;
    color: var(--text);
    white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    z-index: 50;
    text-align: center;
  }
  .word-chip .tooltip::after {
    content: '';
    position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--cat-color, var(--accent1));
  }
  .word-chip:hover .tooltip { opacity: 1; }

  /* Dialog panel */
  .dialog-panel {
    padding: 30px 40px;
    background: rgba(255,255,255,0.01);
  }
  .dialog-panel h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--muted);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .dialog-tabs {
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .dialog-tab {
    padding: 6px 16px;
    border-radius: 50px;
    border: 1px solid var(--border);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
  }
  .dialog-tab.active {
    border-color: var(--cat-color, var(--accent1));
    color: var(--cat-color, var(--accent1));
    background: rgba(232,184,109,0.08);
  }

  .dialog-content { display: none; }
  .dialog-content.active { display: block; }

  .dialog-box {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 16px;
  }

  .dialog-line {
    display: flex; gap: 12px;
    margin-bottom: 14px;
    position: relative;
  }
  .dialog-speaker {
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    min-width: 60px;
    padding-top: 2px;
    color: var(--cat-color, var(--accent1));
  }
  .dialog-text {
    font-size: 1rem;
    line-height: 1.5;
    cursor: default;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
    position: relative;
  }
  .dialog-text:hover {
    border-bottom-color: var(--cat-color, var(--accent1));
  }
  .dialog-text .text-tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0;
    background: var(--card);
    border: 1px solid var(--cat-color, var(--accent1));
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    max-width: 350px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    z-index: 50;
    white-space: nowrap;
  }
  .dialog-text:hover .text-tooltip { opacity: 1; }

  .text-box {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 24px;
  }
  .text-box p {
    line-height: 1.7;
    margin-bottom: 12px;
    font-size: 1rem;
    cursor: default;
  }
  .text-box p:last-child { margin-bottom: 0; }
  .text-translation {
    color: var(--muted);
    font-style: italic;
    font-size: 0.9rem;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    margin-top: 14px;
    display: none;
  }
  .show-translation-btn {
    margin-top: 16px;
    padding: 8px 20px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .show-translation-btn:hover {
    border-color: var(--cat-color, var(--accent1));
    color: var(--cat-color, var(--accent1));
  }

  /* Speaking indicator */
  @keyframes pulse-speak {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .speaking { animation: pulse-speak 0.5s infinite; color: var(--cat-color, var(--accent1)) !important; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .mindmap-grid { padding: 20px; gap: 14px; }
    .cat-page-body { grid-template-columns: 1fr; }
    .words-panel { border-right: none; border-bottom: 1px solid var(--border); }
    .words-panel, .dialog-panel { padding: 20px; }
    header { padding: 14px 20px; }
    .cat-page-header { padding: 30px 20px 20px; flex-wrap: wrap; }
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .category-card {
    animation: fadeInUp 0.4s ease both;
  }
</style>
</head>
<body>

<header>
  <div class="logo">DELF A1 <span>Lexique Interactif</span></div>
  <div class="nav-back" id="navBack" onclick="showMindmap()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Retour à la carte
  </div>
</header>

<!-- MINDMAP PAGE -->
<div id="page-mindmap" class="page active">
  <div class="mindmap-hero">
    <h1>Carte mentale<br>du vocabulaire</h1>
    <p>Cliquez sur une catégorie pour explorer les mots et dialogues</p>
  </div>
  <div class="mindmap-grid" id="mindmapGrid"></div>
</div>

<!-- CATEGORY PAGE -->
<div id="page-category" class="page">
  <div class="cat-page-header">
    <div class="cat-page-icon" id="catIcon"></div>
    <div>
      <h2 id="catTitle"></h2>
      <p id="catSubtitle"></p>
    </div>
  </div>
  <div class="cat-page-body">
    <div class="words-panel">
      <h3>Vocabulaire</h3>
      <div class="words-grid" id="wordsGrid"></div>
    </div>
    <div class="dialog-panel">
      <h3>Textes & Dialogues</h3>
      <div class="dialog-tabs">
        <div class="dialog-tab active" data-tab="dialog" onclick="showTab('dialog', this)">Dialogue</div>
        <div class="dialog-tab" data-tab="text" onclick="showTab('text', this)">Texte</div>
      </div>
      <div class="dialog-content active" id="tab-dialog"></div>
      <div class="dialog-content" id="tab-text"></div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const CATEGORIES = [
  {
    id: 'saluer',
    icon: '👋',
    title: 'Saluer & Prendre congé',
    subtitle: 'Greetings & Farewells',
    color: '#e8b86d',
    words: [
      { fr: 'Bonjour', ru: 'Добрый день / Здравствуйте', pron: 'bɔ̃.ʒuʁ' },
      { fr: 'Bonsoir', ru: 'Добрый вечер', pron: 'bɔ̃.swaʁ' },
      { fr: 'Salut !', ru: 'Привет!', pron: 'sa.ly' },
      { fr: 'Ça va ?', ru: 'Как дела?', pron: 'sa va' },
      { fr: 'Comment ça va ?', ru: 'Как у тебя дела?', pron: 'kɔ.mɑ̃ sa va' },
      { fr: 'Coucou !', ru: 'Ку-ку! / Привет!', pron: 'ku.ku' },
      { fr: 'Au revoir !', ru: 'До свидания!', pron: 'o ʁə.vwaʁ' },
      { fr: 'À plus tard !', ru: 'До встречи!', pron: 'a ply taʁ' },
      { fr: 'À lundi !', ru: 'До понедельника!', pron: 'a lœ̃.di' },
      { fr: 'À ce soir.', ru: 'До вечера.', pron: 'a sə swaʁ' },
      { fr: 'À très bientôt.', ru: 'До скорой встречи.', pron: 'a tʁɛ bjɛ̃.to' },
      { fr: 'À dimanche !', ru: 'До воскресенья!', pron: 'a di.mɑ̃ʃ' },
      { fr: 'Bises.', ru: 'Поцелуи. / Целую.', pron: 'biz' },
      { fr: 'Bisous.', ru: 'Поцелуйчики.', pron: 'bi.zu' },
    ],
    dialog: {
      lines: [
        { speaker: 'Lucas', fr: '— Salut, Emma ! Ça va ?', ru: '— Привет, Эмма! Как дела?' },
        { speaker: 'Emma', fr: '— Bonjour, Lucas ! Oui, ça va bien, merci. Et toi ?', ru: '— Привет, Люка! Да, всё хорошо, спасибо. А у тебя?' },
        { speaker: 'Lucas', fr: '— Ça va très bien ! Tu viens à la fête ce soir ?', ru: '— Очень хорошо! Ты придёшь на вечеринку сегодня вечером?' },
        { speaker: 'Emma', fr: '— Oui ! À ce soir alors !', ru: '— Да! До вечера тогда!' },
        { speaker: 'Lucas', fr: '— À ce soir ! Bisous !', ru: '— До вечера! Целую!' },
      ]
    },
    text: {
      fr: 'En France, on dit "Bonjour" le matin et "Bonsoir" le soir. Entre amis, on dit souvent "Salut !" ou "Coucou !". Pour se quitter, on dit "Au revoir" ou "À bientôt". Les amis et la famille se font souvent la bise.',
      ru: 'Во Франции говорят «Bonjour» утром и «Bonsoir» вечером. Между друзьями часто говорят «Salut!» или «Coucou!». Прощаясь, говорят «Au revoir» или «À bientôt». Друзья и семья часто приветствуют друг друга поцелуем в щёку.'
    }
  },
  {
    id: 'presenter',
    icon: '🪪',
    title: 'Se présenter',
    subtitle: 'Introductions & Identity',
    color: '#7eb8d4',
    words: [
      { fr: 'un nom', ru: 'фамилия', pron: 'œ̃ nɔ̃' },
      { fr: 'un prénom', ru: 'имя', pron: 'œ̃ pʁe.nɔ̃' },
      { fr: 'un numéro', ru: 'номер', pron: 'œ̃ ny.me.ʁo' },
      { fr: 'une nationalité', ru: 'национальность', pron: 'yn na.sjɔ.na.li.te' },
      { fr: 'africain', ru: 'африканский', pron: 'a.fʁi.kɛ̃' },
      { fr: 'belge', ru: 'бельгийский', pron: 'bɛlʒ' },
      { fr: 'italien', ru: 'итальянский', pron: 'i.ta.ljɛ̃' },
      { fr: "l'âge", ru: 'возраст', pron: 'laʒ' },
      { fr: "une pièce d'identité", ru: 'удостоверение личности', pron: 'yn pjɛs di.dɑ̃.ti.te' },
      { fr: "une photo d'identité", ru: 'фото на документ', pron: 'yn fo.to di.dɑ̃.ti.te' },
      { fr: 'une date de naissance', ru: 'дата рождения', pron: 'yn dat də nɛ.sɑ̃s' },
      { fr: 'une ville de naissance', ru: 'город рождения', pron: 'yn vil də nɛ.sɑ̃s' },
      { fr: 'une adresse', ru: 'адрес', pron: 'yn a.dʁɛs' },
      { fr: 'le code postal', ru: 'почтовый индекс', pron: 'lə kɔd pɔs.tal' },
      { fr: 'la ville', ru: 'город', pron: 'la vil' },
      { fr: 'le pays', ru: 'страна', pron: 'lə pe.i' },
      { fr: 'Je m\'appelle…', ru: 'Меня зовут…', pron: 'ʒə ma.pɛl' },
      { fr: 'Je suis italien.', ru: 'Я итальянец.', pron: 'ʒə sɥi i.ta.ljɛ̃' },
      { fr: 'J\'ai 14 ans.', ru: 'Мне 14 лет.', pron: 'ʒe ka.tɔʁz ɑ̃' },
      { fr: 'J\'habite à Nantes.', ru: 'Я живу в Нанте.', pron: 'ʒa.bit a nɑ̃t' },
    ],
    dialog: {
      lines: [
        { speaker: 'Erdem', fr: '— Bonjour ! Je m\'appelle Erdem. Et toi ?', ru: '— Привет! Меня зовут Эрдем. А тебя?' },
        { speaker: 'Julie', fr: '— Moi, c\'est Julie. Je suis ta correspondante française !', ru: '— Я Жюли. Я твой французский корреспондент!' },
        { speaker: 'Erdem', fr: '— Enchanté ! Tu habites où ?', ru: '— Приятно познакомиться! Где ты живёшь?' },

        { speaker: 'Erdem', fr: '— J\'ai 15 ans. Je suis turc, j\'habite à Istanbul.', ru: '— Мне 15 лет. Я турок, живу в Стамбуле.' },

    text: {
      fr: 'Pour se présenter, on dit son prénom et son nom. On dit aussi sa nationalité, son âge et sa ville. Une pièce d\'identité contient une photo d\'identité, une date de naissance et une adresse avec le code postal.',
      ru: 'При представлении говорят своё имя и фамилию. Также называют национальность, возраст и город. Удостоверение личности содержит фотографию, дату рождения и адрес с почтовым индексом.'
    }
  },
  {
    id: 'famille',
    icon: '👨‍👩‍👧‍👦',
    title: 'La famille & Les personnes',
    subtitle: 'Family & People',
    color: '#c47fc4',
    words: [
      { fr: 'une personne', ru: 'человек', pron: 'yn pɛʁ.sɔn' },
      { fr: 'un homme', ru: 'мужчина', pron: 'œ̃n‿ɔm' },

      { fr: 'un garçon', ru: 'мальчик', pron: 'œ̃ ɡaʁ.sɔ̃' },
      { fr: 'une fille', ru: 'девочка / дочь', pron: 'yn fij' },
      { fr: 'un bébé', ru: 'младенец', pron: 'œ̃ be.be' },
      { fr: 'un collégien', ru: 'школьник (коллеж)', pron: 'œ̃ kɔ.le.ʒjɛ̃' },
      { fr: 'un lycéen', ru: 'старшеклассник', pron: 'œ̃ li.se.ɛ̃' },
      { fr: 'un copain', ru: 'приятель / друг', pron: 'œ̃ kɔ.pɛ̃' },
      { fr: 'une copine', ru: 'подруга', pron: 'yn kɔ.pin' },
      { fr: 'un ami', ru: 'друг', pron: 'œ̃n‿a.mi' },
      { fr: 'les parents', ru: 'родители', pron: 'le pa.ʁɑ̃' },
      { fr: 'les grands-parents', ru: 'бабушка и дедушка', pron: 'le ɡʁɑ̃.pa.ʁɑ̃' },

// ── HELPERS ──────────────────────────────────────────────────────────────────

let currentCatIndex = null;

function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR'; u.rate = 0.85; u.pitch = 1;
    window.speechSynthesis.speak(u);
  }
}

function showMindmap() {
  document.getElementById('page-mindmap').classList.add('active');
  document.getElementById('page-category').classList.remove('active');
  document.getElementById('navBack').style.display = 'none';
}

function showCategory(idx) {
  currentCatIndex = idx;
  const cat = CATEGORIES[idx];
  document.getElementById('page-mindmap').classList.remove('active');
  document.getElementById('page-category').classList.add('active');
  document.getElementById('navBack').style.display = 'flex';

  // Set color variable
  document.getElementById('page-category').style.setProperty('--cat-color', cat.color);

  // Header
  document.getElementById('catIcon').textContent = cat.icon;
  document.getElementById('catTitle').textContent = cat.title;
  document.getElementById('catSubtitle').textContent = cat.subtitle;

  // Words
  const grid = document.getElementById('wordsGrid');
  grid.innerHTML = '';
  cat.words.forEach(w => {
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    // Используем data-атрибут для безопасного хранения текста
    chip.setAttribute('data-fr', w.fr);
    chip.innerHTML = `
      <span>${w.fr}</span>
      <span class="speak-btn" title="Écouter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      </span>
      <div class="tooltip">
        <strong>${w.pron}</strong><br>${w.ru}
      </div>
    `;
    const speakBtn = chip.querySelector('.speak-btn');
    const textToSpeak = w.fr;
    chip.addEventListener('click', (e) => {
      // Предотвращаем срабатывание, если клик был по кнопке
      if (e.target.closest('.speak-btn')) return;
      speak(textToSpeak);
    });
    speakBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      speakBtn.classList.add('speaking');
      speak(textToSpeak);
      setTimeout(() => speakBtn.classList.remove('speaking'), 1500);
    });
    grid.appendChild(chip);
  });

  // Dialog
  const dialogEl = document.getElementById('tab-dialog');
  dialogEl.innerHTML = '<div class="dialog-box">' + cat.dialog.lines.map(l => `
    <div class="dialog-line">
      <span class="dialog-speaker">${l.speaker}</span>
      <span class="dialog-text">${l.fr}
        <span class="text-tooltip">${l.ru}</span>
      </span>
    </div>
  `).join('') + '</div>';

  // Text
  const textEl = document.getElementById('tab-text');
  textEl.innerHTML = `
    <div class="text-box">
      <p>${cat.text.fr}</p>
      <div class="text-translation" id="textTranslation">${cat.text.ru}</div>
    </div>
    <button class="show-translation-btn" onclick="toggleTranslation()">Afficher la traduction</button>
  `;

  // Reset tabs
  showTab('dialog');
  window.scrollTo(0,0);
}

function showTab(name, el) {
  document.querySelectorAll('.dialog-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.dialog-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (el) {
    el.classList.add('active');
  } else {
    // Если el не передан (вызов из другого места), находим нужную вкладку
    const tabToActivate = document.querySelector(`.dialog-tab[data-tab="${name}"]`);
    if (tabToActivate) tabToActivate.classList.add('active');
  }
}

function toggleTranslation() {
  const el = document.getElementById('textTranslation');
  const btn = document.querySelector('.show-translation-btn');
  if (el.style.display === 'block') {
    el.style.display = 'none';
    btn.textContent = 'Afficher la traduction';
  } else {
    el.style.display = 'block';
    btn.textContent = 'Masquer la traduction';
  }
}

// ── RENDER MINDMAP ────────────────────────────────────────────────────────────

function renderMindmap() {
  const grid = document.getElementById('mindmapGrid');
  CATEGORIES.forEach((cat, idx) => {
    const card = document.createElement('div');
    card.className = 'category-card';
    card.style.setProperty('--accent-color', cat.color);
    card.style.animationDelay = `${idx * 0.04}s`;
    card.innerHTML = `
      <span class="cat-icon">${cat.icon}</span>
      <div class="cat-title">${cat.title}</div>
      <div class="cat-subtitle">${cat.subtitle}</div>
      <div class="cat-count"><span>${cat.words.length}</span> mots</div>
      <div class="cat-arrow">→</div>
    `;
    card.addEventListener('click', () => showCategory(idx));
    grid.appendChild(card);
  });
}

renderMindmap();
