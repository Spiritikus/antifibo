<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Style Chart - Bybit Market Data</title>
    <!-- TradingView Lightweight Charts v4.1.0 -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #131722;
            color: #d1d4dc;
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .toolbar {
            background-color: #1e222d;
            border-bottom: 1px solid #2a2e39;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            z-index: 10;
        }

        .symbol-info {
            display: flex;
            align-items: baseline;
            gap: 8px;
            background: #2a2e39;
            padding: 4px 12px;
            border-radius: 6px;
        }

        .symbol {
            font-weight: 700;
            font-size: 18px;
            color: #ffffff;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .timeframe-btn {
            background: transparent;
            border: none;
            color: #787b86;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .timeframe-btn:hover {
            color: #d1d4dc;
            background: #2a2e39;
        }

        .timeframe-btn.active {
            color: #2962ff;
            background: rgba(41, 98, 255, 0.15);
        }

        .status-badge {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #787b86;
        }

        .led.green {
            background-color: #00ff9d;
            box-shadow: 0 0 5px #00ff9d;
        }

        .led.red {
            background-color: #f23645;
        }

        .chart-container {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        #chart {
            width: 100%;
            height: 100%;
        }

        .status-bar {
            background-color: #1e222d;
            border-top: 1px solid #2a2e39;
            padding: 4px 16px;
            font-size: 11px;
            display: flex;
            gap: 24px;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="toolbar">
        <div class="symbol-info">
            <span class="symbol" id="symbol-name">BTCUSDT</span>
            <span class="description">Perpetual</span>
        </div>
        <div class="controls" id="timeframe-controls">
            <button data-interval="1" class="timeframe-btn">1m</button>
            <button data-interval="5" class="timeframe-btn">5m</button>
            <button data-interval="15" class="timeframe-btn">15m</button>
            <button data-interval="60" class="timeframe-btn active">1h</button>
            <button data-interval="D" class="timeframe-btn">1D</button>
        </div>
        <div class="status-badge">
            <div class="led" id="ws-led"></div>
            <span id="ws-status">Загрузка...</span>
        </div>
    </div>
    <div class="chart-container">
        <div id="chart"></div>
    </div>
    <div class="status-bar">
        <span>📊 Bybit API v5</span>
        <span id="price-info">Цена: --</span>
        <span id="update-time"></span>
    </div>
</div>

<script>
    // Дожидаемся загрузки DOM
    document.addEventListener('DOMContentLoaded', () => {
        // Получаем элемент для графика
        const chartElement = document.getElementById('chart');
        
        // Создаем график с правильными размерами
        const chart = LightweightCharts.createChart(chartElement, {
            width: chartElement.clientWidth,
            height: chartElement.clientHeight,
            layout: {
                background: { color: '#131722' },
                textColor: '#d1d4dc',
            },
            grid: {
                vertLines: { color: '#2a2e39' },
                horzLines: { color: '#2a2e39' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            rightPriceScale: {
                borderColor: '#2a2e39',
            },
            timeScale: {
                borderColor: '#2a2e39',
                timeVisible: true,
                secondsVisible: false,
            },
        });

        // Создаем свечную серию
        const candlestickSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
            upColor: '#00ff9d',
            downColor: '#f23645',
            borderDownColor: '#f23645',
            borderUpColor: '#00ff9d',
            wickDownColor: '#f23645',
            wickUpColor: '#00ff9d',
        });

        // Создаем серию для объема
        const volumeSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
            color: '#2962ff',
            priceFormat: {
                type: 'volume',
            },
            priceScaleId: '',
        });

        // Настройка шкалы объема
        chart.priceScale('').applyOptions({
            scaleMargins: {
                top: 0.8,
                bottom: 0,
            },
        });

        // Переменные
        let currentSymbol = 'BTCUSDT';
        let currentInterval = '60';
        let ws = null;

        // Функция форматирования времени (Bybit возвращает timestamp в секундах)
        function formatKlineTime(timestamp) {
            // Bybit возвращает timestamp в секундах или миллисекундах? Проверим
            // Если число больше 10^12 - это миллисекунды
            if (timestamp > 1000000000000) {
                return Math.floor(timestamp / 1000);
            }
            return timestamp;
        }

        // Загрузка исторических данных
        async function loadHistoricalData() {
            try {
                const intervalMap = {
                    '1': '1',
                    '5': '5', 
                    '15': '15',
                    '60': '60',
                    'D': 'D'
                };
                
                const bybitInterval = intervalMap[currentInterval];
                const url = `https://api.bybit.com/v5/market/kline?category=linear&symbol=${currentSymbol}&interval=${bybitInterval}&limit=200`;
                
                console.log('Загрузка данных:', url);
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.retCode !== 0) {
                    throw new Error(data.retMsg);
                }
                
                const klines = data.result.list;
                console.log('Получено свечей:', klines.length);
                
                // Bybit возвращает от новых к старым, разворачиваем
                const reversedKlines = [...klines].reverse();
                
                // Преобразуем данные для графика
                const chartData = [];
                const volumeData = [];
                
                for (const kline of reversedKlines) {
                    // Bybit возвращает timestamp в миллисекундах
                    const time = Math.floor(parseInt(kline[0]) / 1000);
                    
                    chartData.push({
                        time: time,
                        open: parseFloat(kline[1]),
                        high: parseFloat(kline[2]),
                        low: parseFloat(kline[3]),
                        close: parseFloat(kline[4]),
                    });
                    
                    volumeData.push({
                        time: time,
                        value: parseFloat(kline[5]),
                        color: parseFloat(kline[1]) <= parseFloat(kline[4]) ? '#00ff9d33' : '#f2364533'
                    });
                }
                
                if (chartData.length > 0) {
                    candlestickSeries.setData(chartData);
                    volumeSeries.setData(volumeData);
                    chart.timeScale().fitContent();
                    
                    // Обновляем цену
                    const lastPrice = chartData[chartData.length - 1].close;
                    document.getElementById('price-info').innerHTML = `Цена: $${lastPrice.toFixed(2)}`;
                    document.getElementById('update-time').innerHTML = `Обновлено: ${new Date().toLocaleTimeString()}`;
                    
                    // Обновляем статус
                    const led = document.getElementById('ws-led');
                    led.classList.add('green');
                    led.classList.remove('red');
                    document.getElementById('ws-status').innerHTML = 'Данные загружены';
                    
                    return chartData[chartData.length - 1];
                }
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('ws-status').innerHTML = 'Ошибка загрузки';
                const led = document.getElementById('ws-led');
                led.classList.remove('green');
                led.classList.add('red');
                return null;
            }
        }
        
        // WebSocket подключение
        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }
            
            ws = new WebSocket('wss://stream.bybit.com/v5/public/linear');
            
            ws.onopen = () => {
                console.log('WebSocket подключен');
                document.getElementById('ws-status').innerHTML = 'Live данные';
                const led = document.getElementById('ws-led');
                led.classList.add('green');
                led.classList.remove('red');
                
                // Подписываемся на свечи
                const intervalMap = {'1':'1','5':'5','15':'15','60':'60','D':'D'};
                const topic = `kline.${intervalMap[currentInterval]}.${currentSymbol}`;
                ws.send(JSON.stringify({
                    op: 'subscribe',
                    args: [topic]
                }));
            };
            
            ws.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);
                    
                    // Ответ на ping
                    if (message.op === 'ping') {
                        ws.send(JSON.stringify({ op: 'pong' }));
                        return;
                    }
                    
                    // Обработка данных свечи
                    if (message.topic && message.topic.includes('kline') && message.data) {
                        const klineData = message.data;
                        const time = Math.floor(klineData.start / 1000);
                        const open = parseFloat(klineData.open);
                        const high = parseFloat(klineData.high);
                        const low = parseFloat(klineData.low);
                        const close = parseFloat(klineData.close);
                        const volume = parseFloat(klineData.volume);
                        
                        const candle = { time, open, high, low, close };
                        const volData = { 
                            time, 
                            value: volume,
                            color: open <= close ? '#00ff9d33' : '#f2364533'
                        };
                        
                        // Обновляем график
                        candlestickSeries.update(candle);
                        volumeSeries.update(volData);
                        
                        // Обновляем информацию о цене
                        document.getElementById('price-info').innerHTML = `Цена: $${close.toFixed(2)}`;
                        document.getElementById('update-time').innerHTML = `Обновлено: ${new Date().toLocaleTimeString()}`;
                        
                        // Мигаем индикатором
                        const led = document.getElementById('ws-led');
                        led.style.opacity = '0.5';
                        setTimeout(() => { led.style.opacity = '1'; }, 200);
                    }
                } catch (error) {
                    console.error('Ошибка обработки сообщения:', error);
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket ошибка:', error);
                document.getElementById('ws-status').innerHTML = 'WS ошибка';
                const led = document.getElementById('ws-led');
                led.classList.remove('green');
                led.classList.add('red');
            };
            
            ws.onclose = () => {
                console.log('WebSocket отключен, переподключение через 5 сек...');
                document.getElementById('ws-status').innerHTML = 'Переподключение...';
                setTimeout(connectWebSocket, 5000);
            };
        }
        
        // Смена таймфрейма
        async function changeInterval(interval) {
            currentInterval = interval;
            
            // Обновляем активную кнопку
            document.querySelectorAll('.timeframe-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-interval') === interval) {
                    btn.classList.add('active');
                }
            });
            
            // Переподключаем WebSocket с новым интервалом
            if (ws && ws.readyState === WebSocket.OPEN) {
                // Отписываемся от старого
                const intervalMap = {'1':'1','5':'5','15':'15','60':'60','D':'D'};
                const oldTopic = `kline.${intervalMap[currentInterval === interval ? interval : '60']}.${currentSymbol}`;
                ws.send(JSON.stringify({
                    op: 'unsubscribe',
                    args: [oldTopic]
                }));
                
                // Подписываемся на новый
                const newTopic = `kline.${intervalMap[interval]}.${currentSymbol}`;
                ws.send(JSON.stringify({
                    op: 'subscribe',
                    args: [newTopic]
                }));
            }
            
            // Перезагружаем исторические данные
            await loadHistoricalData();
        }
        
        // Обработка изменения размера окна
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const width = chartElement.clientWidth;
                const height = chartElement.clientHeight;
                chart.applyOptions({ width, height });
                chart.timeScale().fitContent();
            }, 100);
        });
        
        // Инициализация приложения
        async function init() {
            // Загружаем исторические данные
            await loadHistoricalData();
            
            // Подключаем WebSocket
            connectWebSocket();
            
            // Назначаем обработчики кнопок
            document.querySelectorAll('.timeframe-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const interval = e.target.getAttribute('data-interval');
                    changeInterval(interval);
                });
            });
        }
        
        // Запускаем приложение
        init();
    });
</script>
</body>
</html>
